<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIJOS Marketplace</title>
    <link rel="stylesheet" href="unijosite-sundry.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">
            <a href="file:///C:/Users/JC/Desktop/Bluehouse_interns/html_basics/unijosite/unijosite.html"><h2>UNIJOS</h2></a>
        </div>

        <nav>
            <ul>
                <li><a href="#">SOUVENIR</a></li>
                <li><a href="#">MY ORDERS</a></li>
                <li><a href="#">PROFILE</a></li>
                <li><a href="#">LOGOUT</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero -->
    <section class="hero">
        <h1>Sundry and Other Income Charges / University's Market Place</h1>
    </section>

    <!-- Categories -->
    <section class="categories">
        <button>Souvenir</button>
        <button>Academic Gown</button>
        <button>Convocation Materials</button>
    </section>

    <!-- Product Table -->
    <section class="products">
        <table>
            <thead>
                <tr>
                    <th>S/N</th>
                    <th>Product Name</th>
                    <th>Price</th>
                    <th>Qty</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>1</td>
                    <td>UNIJOS T-Shirt</td>
                    <td>₦5,000</td>
                    <td>
                        <input type="number" value="1" min="1">
                    </td>
                    <td>
                        <button class="cart-btn">
                            Add to Cart
                        </button>
                    </td>
                </tr>

                <tr>
                    <td>2</td>
                    <td>Academic Gown</td>
                    <td>₦10,000</td>
                    <td>
                        <input type="number" value="1" min="1">
                    </td>
                    <td>
                        <button class="cart-btn">
                            Add to Cart
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>

    <!-- Cart -->
    <section class="cart">
        <h2>Cart</h2>
        <p>No item added.</p>
    </section>

    <!-- Online Users -->
    <section class="users">
        <h3>Online Users</h3>
        <p>15 users online</p>
    </section>

    <footer>
        <p>© 2026 University of Jos Marketplace</p>
    </footer>

</body>
</html>
